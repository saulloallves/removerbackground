<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rembg - Remover Fundo de Imagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #555;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #888;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .options {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .option-group label {
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            background: white;
            min-width: 200px;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            color: #444;
        }

        .images-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .images-container {
                grid-template-columns: 1fr;
            }
        }

        .image-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .image-box h3 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.2rem;
        }

        .image-wrapper {
            position: relative;
            min-height: 300px;
            background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 20px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
        }

        .placeholder {
            color: #aaa;
            font-size: 1rem;
        }

        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1rem;
        }

        .download-btn {
            display: none;
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            display: none;
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        .api-info {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px 20px;
            margin-top: 20px;
            color: white;
            text-align: center;
            font-size: 0.9rem;
        }

        .api-info code {
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Rembg</h1>
        <p class="subtitle">Remova o fundo de suas imagens com IA de alta qualidade</p>

        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p class="upload-text">Clique ou arraste uma imagem aqui</p>
                <p class="upload-hint">Suporta JPG, PNG, WebP (máx. 20MB)</p>
            </div>
            <input type="file" id="fileInput" accept="image/*">

            <div class="options">
                <div class="option-group">
                    <label for="modelSelect">Modelo de IA:</label>
                    <select id="modelSelect">
                        <optgroup label="── Uso Geral ──">
                            <option value="u2net">U2Net (Padrão)</option>
                            <option value="u2netp">U2NetP (Rápido/Leve)</option>
                            <option value="silueta">Silueta (43MB, Leve)</option>
                            <option value="isnet-general-use" selected>ISNet General (Recomendado)</option>
                        </optgroup>
                        <optgroup label="── BiRefNet (Alta Qualidade) ──">
                            <option value="birefnet-general">BiRefNet General</option>
                            <option value="birefnet-general-lite">BiRefNet General Lite</option>
                            <option value="birefnet-massive">BiRefNet Massive</option>
                        </optgroup>
                        <optgroup label="── Pessoas/Retratos ──">
                            <option value="u2net_human_seg">U2Net Human Seg</option>
                            <option value="birefnet-portrait">BiRefNet Portrait</option>
                        </optgroup>
                        <optgroup label="── Especializado ──">
                            <option value="u2net_cloth_seg">U2Net Cloth (Roupas)</option>
                            <option value="isnet-anime">ISNet Anime</option>
                            <option value="birefnet-dis">BiRefNet DIS (Dicotômico)</option>
                            <option value="birefnet-hrsod">BiRefNet HRSOD (Alta Res)</option>
                            <option value="birefnet-cod">BiRefNet COD (Objetos Ocultos)</option>
                        </optgroup>
                        <optgroup label="── Avançado ──">
                            <option value="sam">SAM (Segment Anything)</option>
                            <option value="bria-rmbg">BRIA RMBG (Estado da Arte)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="alphaMatting" checked>
                    <label for="alphaMatting">Alpha Matting (bordas suaves)</label>
                </div>
            </div>

            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="images-container" id="imagesContainer" style="display: none;">
            <div class="image-box">
                <h3>📷 Imagem Original</h3>
                <div class="image-wrapper">
                    <img id="originalImage" src="" alt="Original">
                </div>
            </div>

            <div class="image-box">
                <h3>✨ Sem Fundo</h3>
                <div class="image-wrapper">
                    <img id="resultImage" src="" alt="Resultado" style="display: none;">
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <span class="loading-text">Processando imagem...</span>
                    </div>
                    <span class="placeholder" id="placeholder">Aguardando processamento...</span>
                </div>
                <button class="download-btn" id="downloadBtn">⬇️ Baixar Imagem</button>
            </div>
        </div>

        <div class="api-info">
            API rodando em <code>http://localhost:5000</code> | 
            Powered by <a href="https://github.com/danielgatis/rembg" target="_blank" style="color: white;">rembg</a>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const originalImage = document.getElementById('originalImage');
        const resultImage = document.getElementById('resultImage');
        const loading = document.getElementById('loading');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('downloadBtn');
        const imagesContainer = document.getElementById('imagesContainer');
        const errorMessage = document.getElementById('errorMessage');
        const modelSelect = document.getElementById('modelSelect');
        const alphaMatting = document.getElementById('alphaMatting');

        // API URL - usa proxy local para evitar CORS
        const API_URL = '/api';

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processImage(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processImage(file);
            }
        });

        async function processImage(file) {
            // Mostrar imagem original
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                imagesContainer.style.display = 'grid';
            };
            reader.readAsDataURL(file);

            // Resetar estado
            resultImage.style.display = 'none';
            downloadBtn.style.display = 'none';
            placeholder.style.display = 'none';
            loading.style.display = 'flex';
            errorMessage.style.display = 'none';

            // Preparar requisição
            const formData = new FormData();
            formData.append('file', file);
            formData.append('model', modelSelect.value);
            
            // Alpha matting como form data
            if (alphaMatting.checked) {
                formData.append('a', 'true');
                formData.append('ae', '10');
                formData.append('af', '240');
            }

            // URL simples sem parâmetros (tudo via form data)
            let url = `${API_URL}/`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: ${response.statusText}`);
                }

                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                
                resultImage.src = imageUrl;
                resultImage.style.display = 'block';
                loading.style.display = 'none';
                downloadBtn.style.display = 'block';

                // Configurar download
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = imageUrl;
                    a.download = `sem-fundo-${Date.now()}.png`;
                    a.click();
                };

            } catch (error) {
                loading.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.textContent = 'Erro ao processar';
                errorMessage.textContent = `Erro: ${error.message}. Verifique se a API está rodando.`;
                errorMessage.style.display = 'block';
            }
        }
    </script>
</body>
</html>
